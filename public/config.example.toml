# ════════════════════════════════════════════════════════════════════
#                    MC-TUNNEL CONFIGURATION
# ════════════════════════════════════════════════════════════════════

# ── Режим работы ────────────────────────────────────────────────────
# "vps"    — запуск на VPS (принимает игроков и клиента)
# "client" — запуск на домашнем ПК (подключается к VPS)
mode = "vps"

# ════════════════════════════════════════════════════════════════════
#                        VPS SETTINGS
# ════════════════════════════════════════════════════════════════════

# Порт для подключения игроков Minecraft
game_port = 25565

# Порт для туннеля (control + data каналы)
tunnel_port = 9000

# ════════════════════════════════════════════════════════════════════
#                      CLIENT SETTINGS
# ════════════════════════════════════════════════════════════════════

# Адрес VPS (IP:PORT)
vps_address = "123.45.67.89:9000"

# Адрес локального Minecraft сервера
minecraft_address = "127.0.0.1:25565"

# Задержка между попытками переподключения (секунды)
reconnect_delay_secs = 3

# Максимум попыток переподключения (0 = бесконечно)
max_reconnect_attempts = 0

# ════════════════════════════════════════════════════════════════════
#                     WEB DASHBOARD (NEW!)
# ════════════════════════════════════════════════════════════════════

# Порт для REST API дашборда
# GET http://localhost:3001/api/stats
web_port = 3001
